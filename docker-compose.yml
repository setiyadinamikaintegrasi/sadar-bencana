name: sadar-bencana

services:
  redis:
    image: redis:7-alpine
    container_name: sadar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - sadar-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.api
    container_name: sadar-api
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "8001"
      API_ENV: ${API_ENV:-docker}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the Supabase pooled connection string}
      SUPABASE_URL: ${SUPABASE_URL:?Set SUPABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:?Set SUPABASE_JWT_SECRET}
      MASTRA_BASE_URL: ${MASTRA_BASE_URL:-http://mastra:4111}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001}
    ports:
      - "8001:8001"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.worker
    container_name: sadar-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the Supabase pooled connection string}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8080}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-180}
      LLM_MODEL: ${LLM_MODEL:-gemma4-e4b}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8002"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: sadar-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "3001:3001"

volumes:
  sadar-redis-data:
