name: sadar-bencana

services:
  postgres:
    image: postgres:16-alpine
    container_name: sadar-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sadar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sadar_bencana}
    volumes:
      - sadar-pgdata:/var/lib/postgresql/data
      - ./db/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sadar} -d ${POSTGRES_DB:-sadar_bencana}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: sadar-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - sadar-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.api
    container_name: sadar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "8001"
      API_ENV: ${API_ENV:-docker}
      DATABASE_URL: ${DATABASE_URL:-postgres://sadar:changeme@postgres:5432/sadar_bencana}
    ports:
      - "8001:8001"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile.worker
    container_name: sadar-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://sadar:changeme@postgres:5432/sadar_bencana}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8080}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-180}
      LLM_MODEL: ${LLM_MODEL:-gemma4-e4b}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8002"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: sadar-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "3001:3001"

volumes:
  sadar-pgdata:
  sadar-redis-data:
