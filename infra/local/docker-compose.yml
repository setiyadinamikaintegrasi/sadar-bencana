# =============================================================================
# docker-compose.yml — Sadar Bencana (local dev stack)
# Project : Sadar Bencana
# Usage   : docker compose -f infra/local/docker-compose.yml up -d
# Docs    : see infra/local/README.md
# =============================================================================

name: risk-local

networks:
  risk-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  grafana-data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary datastore (events, alerts, risk_scores, ...)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sadar-postgres
    restart: unless-stopped
    profiles: ["", "core"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sadar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sadar_bencana}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sadar} -d ${POSTGRES_DB:-sadar_bencana}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - risk-net

  # ---------------------------------------------------------------------------
  # Redis 7 — cache / pub-sub / rate-limit / broker-lite
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sadar-redis
    restart: unless-stopped
    profiles: ["", "core"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - risk-net

  # ---------------------------------------------------------------------------
  # Grafana (optional) — dashboards for risk & event metrics.
  # Disabled by default: run with `--profile monitoring`.
  #   docker compose -f infra/local/docker-compose.yml --profile monitoring up -d
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: risk-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - risk-net
